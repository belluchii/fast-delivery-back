service: fast-delivery-back

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs24.x
  stage: ${opt:stage, 'dev'}
  region: us-east-1
  memorySize: 512
  timeout: 30
  environment:
    NODE_ENV: ${env:NODE_ENV, 'lambda'}
    PORT: 3000
    CORS_URL: ${env:CORS_URL}
    URL: ${env:URL}
    JWT_SECRET: ${env:JWT_SECRET}
    JWT_REFRESH_SECRET: ${env:JWT_REFRESH_SECRET}
    EXPIRESIN: ${env:EXPIRESIN, '2d'}
    JWT_REFRESH_EXPIRESIN: ${env:JWT_REFRESH_EXPIRESIN, '7d'}

functions:
  api:
    handler: dist/handler.handler
    events:
      - httpApi: '*'

package:
  individually: false
  patterns:
    - '!node_modules/.cache/**'
    - '!node_modules/aws-sdk/**'
    - '!test/**'
    - '!.git/**'
    - '!README.md'
    - '!*.test.js'
    - '!coverage/**'
    - '!src/**'
    - '!*.test.ts'
    - '!jest.config.*'
    - '!tsconfig*.json'
    - '!nodemon.json'
    - '!.eslintrc*'
    - '!.github/**'
    - 'docs/**'
    - '!docs/**/*.ts'
